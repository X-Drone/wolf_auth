name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ========== COPY FILES TO SERVER ==========
      - name: Copy project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,client,server"
          target: "/volume1/web/wolf_auth"
          overwrite: true

      # ========== SETUP AND START SERVICES ==========
      - name: Setup environment and start services
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /volume1/web/wolf_auth
            
            cat > .env <<EOL
            COMPOSE_PROJECT_NAME=wolf_auth
            DATABASE_USER=postgres
            DATABASE_PASSWORD=postgres
            DATABASE_DB=wolf_auth
            DEBUG=false
            EOL

            cat > server/.env <<EOL
            DEBUG=false
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALGORITHM=HS256
            ACCESS_TOKEN_EXPIRE_MINUTES=300
            CORS_ALLOW_ORIGIN_REGEX=${{ secrets.CORS_ALLOW_ORIGIN_REGEX }}
            EOL

            chmod 600 .env server/.env

            docker-compose down
            docker-compose up -d --build
            
            echo "Services started successfully"

      # ========== VERIFY ==========
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /volume1/web/wolf_auth
            docker-compose ps
            echo "Deployed successfully"
