version: '3.8'

services:
  owasp-zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: owasp-zap-stable
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=your_zap_api_key_here
    # Опционально: проброс портов для доступа к ZAP API и UI (НЕ рекомендуется для production)
    ports:
      - "8080:8080"  # ZAP API и Proxy
      # - "8081:8081" # Если планируется запуск ZAP UI (не в daemon режиме)
    # volumes:
    #   - ./zap_logs:/home/zap/.ZAP # Опционально: для сохранения логов/сессий ZAP
    networks:
      - zap_network
    # environment:
    #   - ZAP_AUTH_HEADER_NAME= # Опционально: если используется аутентификация через заголовок
    #   - ZAP_AUTH_HEADER_VALUE= # Опционально: значение заголовка аутентификации

networks:
  zap_network:
    driver: bridge # Используем bridge-сеть по умолчанию, можно настроить иначе